# ===================================
# La Bàn Đầu Tư — Docker Compose
# ===================================
#
# Cách dùng (chạy từ gốc dự án):
#   • Chỉ web/API:        docker compose -f docker/docker-compose.yml up -d server
#   • Chỉ chạy theo lịch: docker compose -f docker/docker-compose.yml up -d analyzer
#   • Cả hai:             docker compose -f docker/docker-compose.yml up -d
#
# Trước khi chạy: tạo file .env ở gốc dự án (xem .env.example) với GEMINI_API_KEY.

name: laban-dautu

x-common: &common
  build:
    context: ..
    dockerfile: docker/Dockerfile
  restart: unless-stopped

  # Nạp biến môi trường từ .env. KHÔNG mount ../.env như một file volume vào /app/.env,
  # vì mount point sẽ chặn os.replace (cập nhật cấu hình nguyên tử) khi lưu từ trang Cài Đặt.
  env_file:
    - ../.env

  volumes:
    - ../data:/app/data
    - ../logs:/app/logs
    - ../reports:/app/reports
    - ../strategies:/app/strategies:ro

  environment:
    - TZ=Asia/Ho_Chi_Minh
    - WEBUI_HOST=0.0.0.0
    - MARKET_REVIEW_REGION=vn
    - REPORT_LANGUAGE=vi
    # Nếu chạy đồng thời server + analyzer (cùng file SQLite), cho writer chờ-thử-lại
    # thay vì văng SQLITE_BUSY ngay lập tức.
    - SQLITE_BUSY_TIMEOUT_MS=5000
    # API_PORT đọc từ .env, không cần hardcode ở đây

  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

  # Giới hạn tài nguyên: phân tích đầy đủ nên có 1G+; 512M chỉ hợp web/API nhẹ,
  # ít mã, đặt MAX_WORKERS=1 và tránh chạy đồng thời analyzer + server.
  deploy:
    resources:
      limits:
        memory: 1G
      reservations:
        memory: 512M

services:
  # Web + API (mặc định dùng cái này)
  server:
    <<: *common
    container_name: laban-server
    command: ["python", "main.py", "--serve-only", "--host", "0.0.0.0", "--port", "${API_PORT:-8000}"]
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"

  # Chạy phân tích theo lịch (tùy chọn — bật khi cần cron tự động)
  analyzer:
    <<: *common
    container_name: laban-analyzer
    command: ["python", "main.py", "--schedule"]
